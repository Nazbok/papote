<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#6d5efc">
<title>papote 💬</title>
<style>
:root{
  --bg1:#1a1030; --bg2:#0d0820; --panel:rgba(255,255,255,.06); --panel2:rgba(255,255,255,.09);
  --stroke:rgba(255,255,255,.12); --text:#f0edff; --muted:#a99fcf;
  --accent:#8b7bff; --accent2:#ff6fae; --green:#3ddc97; --red:#ff5c7a; --gold:#ffcf5c;
  --shadow:0 12px 40px rgba(0,0,0,.45);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  margin:0; font-family:"Segoe UI",system-ui,-apple-system,sans-serif; color:var(--text);
  background:radial-gradient(1200px 800px at 10% -10%,#3a1f6e 0,transparent 55%),
             radial-gradient(1000px 700px at 110% 10%,#7a2b6b 0,transparent 50%),
             linear-gradient(160deg,var(--bg1),var(--bg2));
  background-attachment:fixed; overflow:hidden;
}
button{font-family:inherit; cursor:pointer; border:none; color:var(--text)}
input{font-family:inherit}
.hidden{display:none!important}
.btn{
  background:linear-gradient(135deg,var(--accent),#6d5efc); color:#fff; border-radius:12px;
  padding:11px 16px; font-weight:600; font-size:14px; transition:transform .12s,box-shadow .2s,filter .2s;
  box-shadow:0 6px 18px rgba(109,94,252,.35);
}
.btn:hover{transform:translateY(-2px); filter:brightness(1.08)}
.btn:active{transform:translateY(0) scale(.97)}
.btn.ghost{background:var(--panel2); box-shadow:none; border:1px solid var(--stroke)}
.btn.pink{background:linear-gradient(135deg,var(--accent2),#ff4f97); box-shadow:0 6px 18px rgba(255,79,151,.35)}
.btn.green{background:linear-gradient(135deg,#37d99a,#22b07a); box-shadow:0 6px 18px rgba(55,217,154,.3)}
.btn.gold{background:linear-gradient(135deg,#ffd76a,#f5a742); color:#3a2600; box-shadow:0 6px 18px rgba(245,167,66,.3)}
.btn.sm{padding:7px 11px; font-size:13px; border-radius:10px}
.btn:disabled{opacity:.4; cursor:not-allowed; transform:none!important; filter:none}
.field{
  width:100%; padding:13px 14px; border-radius:12px; background:rgba(0,0,0,.25);
  border:1px solid var(--stroke); color:var(--text); font-size:15px; outline:none; transition:border .2s,background .2s;
}
.field:focus{border-color:var(--accent); background:rgba(0,0,0,.35)}
::placeholder{color:var(--muted)}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.14);border-radius:8px}

/* ---------- LOGIN ---------- */
#login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{
  width:100%;max-width:390px;background:var(--panel);backdrop-filter:blur(20px);
  border:1px solid var(--stroke);border-radius:24px;padding:34px 28px;box-shadow:var(--shadow);
  animation:pop .5s cubic-bezier(.2,.9,.3,1.3);
}
.logo{font-size:40px;font-weight:800;text-align:center;letter-spacing:-1px;
  background:linear-gradient(135deg,#fff,#c9bcff);-webkit-background-clip:text;background-clip:text;color:transparent}
.logo .em{-webkit-text-fill-color:initial}
.subtitle{text-align:center;color:var(--muted);margin:2px 0 22px;font-size:14px}
.tabs{display:flex;background:rgba(0,0,0,.25);border-radius:12px;padding:4px;margin-bottom:16px}
.tab{flex:1;text-align:center;padding:9px;border-radius:9px;color:var(--muted);font-weight:600;font-size:14px;transition:.2s;background:none}
.tab.on{background:var(--accent);color:#fff;box-shadow:0 4px 12px rgba(139,123,255,.4)}
.login-card .field{margin-bottom:12px}
.err{color:var(--red);text-align:center;font-size:13px;min-height:18px;margin-top:8px}

/* ---------- APP LAYOUT ---------- */
#app{position:fixed;inset:0;display:flex;flex-direction:column}
.topbar{
  display:flex;align-items:center;gap:12px;padding:10px 16px;
  background:rgba(0,0,0,.28);border-bottom:1px solid var(--stroke);backdrop-filter:blur(12px);z-index:5
}
.topbar .brand{font-weight:800;font-size:20px}
.chip{display:inline-flex;align-items:center;gap:6px;background:var(--panel2);border:1px solid var(--stroke);
  border-radius:999px;padding:6px 13px;font-size:13px;font-weight:600}
.chip.coins{background:linear-gradient(135deg,rgba(255,207,92,.22),rgba(255,207,92,.08));border-color:rgba(255,207,92,.35)}
.spacer{flex:1}
.iconbtn{background:var(--panel2);border:1px solid var(--stroke);border-radius:11px;width:40px;height:40px;
  font-size:18px;display:flex;align-items:center;justify-content:center;transition:.15s}
.iconbtn:hover{background:var(--accent);transform:translateY(-2px)}
.body{flex:1;display:flex;min-height:0}
.sidebar{width:290px;background:rgba(0,0,0,.2);border-right:1px solid var(--stroke);display:flex;flex-direction:column;min-height:0}
.side-head{display:flex;gap:8px;padding:12px;border-bottom:1px solid var(--stroke)}
.side-head .btn{flex:1}
.convos{flex:1;overflow-y:auto;padding:8px}
.section-label{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:1px;padding:12px 10px 6px;font-weight:700}
.convo{display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:13px;transition:.15s;cursor:pointer;position:relative}
.convo:hover{background:var(--panel)}
.convo.on{background:var(--panel2)}
.avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;
  font-size:16px;flex-shrink:0;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.avatar.grp{background:linear-gradient(135deg,#37d99a,#2b9)}
.convo .nm{flex:1;font-weight:600;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dot{width:9px;height:9px;border-radius:50%;background:#555;flex-shrink:0}
.dot.on{background:var(--green);box-shadow:0 0 0 0 rgba(61,220,151,.6);animation:pulse 2s infinite}
.badge{background:var(--accent2);color:#fff;border-radius:999px;font-size:11px;font-weight:700;padding:2px 7px;min-width:20px;text-align:center}
.pending{opacity:.7;font-style:italic;font-size:13px}

/* chat */
.chat{flex:1;display:flex;flex-direction:column;min-height:0}
.chat-head{display:flex;align-items:center;gap:12px;padding:13px 18px;border-bottom:1px solid var(--stroke);background:rgba(0,0,0,.15)}
.chat-head .nm{font-weight:700;font-size:16px}
.chat-head .sub{color:var(--muted);font-size:12px}
.log{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:8px}
.empty{margin:auto;text-align:center;color:var(--muted);max-width:320px}
.empty .big{font-size:52px;margin-bottom:10px}
.msg{max-width:74%;padding:9px 14px;border-radius:16px;font-size:14.5px;line-height:1.4;word-wrap:break-word;
  animation:msgin .35s cubic-bezier(.2,.9,.3,1.2);position:relative}
.msg .who{font-size:11px;font-weight:700;color:var(--accent);margin-bottom:2px}
.msg .t{font-size:10px;color:var(--muted);margin-top:3px;text-align:right}
.msg.them{background:var(--panel2);align-self:flex-start;border-bottom-left-radius:5px}
.msg.me{background:linear-gradient(135deg,var(--accent),#6d5efc);align-self:flex-end;border-bottom-right-radius:5px}
.msg.me .who{color:#e5e0ff}
.msg.duel{align-self:center;background:linear-gradient(135deg,rgba(255,207,92,.2),rgba(255,111,174,.15));
  border:1px solid rgba(255,207,92,.3);text-align:center;font-weight:600;max-width:86%}
.composer{display:flex;gap:8px;align-items:center;padding:12px 14px;border-top:1px solid var(--stroke);background:rgba(0,0,0,.2)}
.composer .field{flex:1}
.composer .iconbtn{width:42px;height:42px;flex-shrink:0}

/* images + réactions */
.msg{position:relative}
.msg-img{max-width:min(280px,60vw);max-height:320px;border-radius:12px;margin-top:4px;cursor:pointer;display:block}
.reacts{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
.react-chip{background:var(--panel2);border:1px solid var(--stroke);border-radius:999px;padding:1px 8px;font-size:12px;
  cursor:pointer;transition:.12s;user-select:none}
.react-chip:hover{transform:translateY(-1px)}
.react-chip.mine{background:rgba(139,123,255,.3);border-color:var(--accent)}
.react-add{position:absolute;top:-10px;right:-8px;width:24px;height:24px;border-radius:50%;
  background:var(--panel2);border:1px solid var(--stroke);font-size:13px;opacity:0;transition:.15s;display:flex;align-items:center;justify-content:center}
.msg:hover .react-add{opacity:1}
.emojipop{position:fixed;z-index:120;background:linear-gradient(160deg,#2a1a52,#1a1030);border:1px solid var(--stroke);
  border-radius:14px;padding:8px;box-shadow:var(--shadow);display:flex;flex-wrap:wrap;gap:2px;max-width:230px;animation:pop .15s}
.emojipop.wide{max-width:300px;max-height:210px;overflow-y:auto}
.ep-emoji{background:none;border:none;font-size:22px;padding:4px 5px;border-radius:8px;cursor:pointer;transition:.1s}
.ep-emoji:hover{background:var(--panel2);transform:scale(1.2)}
.imgview{max-width:94vw;max-height:92vh;cursor:zoom-out}
.imgview img{max-width:94vw;max-height:92vh;border-radius:12px;display:block}

/* ---------- OVERLAYS ---------- */
.overlay{position:fixed;inset:0;background:rgba(6,3,18,.6);backdrop-filter:blur(6px);z-index:40;
  display:flex;align-items:center;justify-content:center;padding:16px;animation:fade .25s}
.sheet{width:100%;max-width:520px;max-height:90vh;overflow-y:auto;background:linear-gradient(160deg,#241748,#180f30);
  border:1px solid var(--stroke);border-radius:22px;padding:22px;box-shadow:var(--shadow);animation:pop .35s cubic-bezier(.2,.9,.3,1.25)}
.sheet h2{margin:0 0 4px;font-size:22px}
.sheet .close{position:absolute;top:16px;right:18px}
.sheet-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.modal-sm{max-width:400px}
.row{display:flex;gap:10px;flex-wrap:wrap}
.row.center{justify-content:center}
.hint{color:var(--muted);font-size:13px;margin:6px 0 12px}

/* casino */
.game-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.game-tab{background:var(--panel2);border:1px solid var(--stroke);border-radius:12px;padding:9px 13px;font-size:14px;font-weight:600;transition:.15s}
.game-tab.on{background:linear-gradient(135deg,var(--accent),#6d5efc);border-color:transparent}
.bet-row{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.bet-row .field{max-width:130px}
.stage{min-height:130px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
  background:rgba(0,0,0,.22);border-radius:16px;padding:18px;margin-bottom:14px}
.big-emoji{font-size:60px;filter:drop-shadow(0 6px 14px rgba(0,0,0,.4))}
.reels{display:flex;gap:12px;font-size:52px}
.reel{width:70px;height:80px;background:rgba(0,0,0,.3);border-radius:14px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.reel.spin{animation:reel .4s linear infinite}
.result-line{font-size:16px;font-weight:700;text-align:center;min-height:22px}
.win{color:var(--green)} .lose{color:var(--red)} .neutral{color:var(--gold)}
.cards{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.card{width:52px;height:72px;background:#fff;color:#111;border-radius:9px;display:flex;align-items:center;justify-content:center;
  font-size:20px;font-weight:800;box-shadow:0 4px 12px rgba(0,0,0,.35);animation:deal .4s cubic-bezier(.2,.9,.3,1.3)}
.card.red{color:#d43}
.card.back{background:linear-gradient(135deg,#6d5efc,#8b7bff);color:#fff}
.hand-label{font-size:13px;color:var(--muted);margin-bottom:4px;text-align:center}

/* leaderboard / stats / online */
.list-row{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:12px;background:var(--panel);margin-bottom:8px}
.list-row .rank{font-size:20px;width:34px;text-align:center}
.list-row .nm{flex:1;font-weight:600}
.list-row .val{font-weight:700;color:var(--gold)}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.stat-box{background:var(--panel);border:1px solid var(--stroke);border-radius:14px;padding:14px;text-align:center}
.stat-box .v{font-size:26px;font-weight:800}
.stat-box .k{color:var(--muted);font-size:12px;margin-top:2px}

/* duel */
.duel-title{text-align:center;font-size:19px;font-weight:800;margin-bottom:4px}
.duel-status{text-align:center;color:var(--muted);min-height:22px;margin-bottom:14px;font-weight:600}
.morpion{display:grid;grid-template-columns:repeat(3,84px);gap:8px;justify-content:center;margin:0 auto 8px}
.cell{height:84px;background:rgba(0,0,0,.28);border-radius:14px;font-size:44px;display:flex;align-items:center;justify-content:center;
  transition:.15s;border:1px solid var(--stroke)}
.cell.playable{cursor:pointer}
.cell.playable:hover{background:var(--panel2);transform:scale(1.04)}
.cell .drop{animation:pop .3s cubic-bezier(.2,.9,.3,1.4)}
.p4wrap{display:flex;flex-direction:column;align-items:center;gap:8px}
.p4cols{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;width:100%;max-width:360px}
.p4colbtn{background:var(--panel2);border:1px solid var(--stroke);border-radius:8px;padding:6px 0;font-size:16px;transition:.15s}
.p4colbtn:hover:not(:disabled){background:var(--accent);transform:translateY(-2px)}
.p4grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;width:100%;max-width:360px;background:rgba(0,0,0,.3);
  padding:8px;border-radius:14px}
.p4cell{aspect-ratio:1;background:rgba(255,255,255,.06);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:min(6vw,26px)}
.p4cell .tok{width:82%;height:82%;border-radius:50%;animation:fall .35s cubic-bezier(.3,.7,.4,1.4)}
.p4cell .r{background:radial-gradient(circle at 35% 30%,#ff8aa5,#e0324f)}
.p4cell .y{background:radial-gradient(circle at 35% 30%,#ffe27a,#f0b429)}

/* toasts + reconnect */
#toasts{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:80;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none}
.toast{background:rgba(20,12,40,.95);border:1px solid var(--stroke);border-radius:12px;padding:11px 18px;font-size:14px;
  font-weight:600;box-shadow:var(--shadow);animation:toastin .3s cubic-bezier(.2,.9,.3,1.3)}
.toast.err{border-color:var(--red);color:#ffc2ce}
.toast.ok{border-color:var(--green)}
#reconnect{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(90deg,#f5a742,#ff6fae);color:#2a1500;
  text-align:center;padding:9px;font-weight:700;font-size:14px;z-index:90;animation:slideup .3s}

@keyframes pop{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
@keyframes fade{from{opacity:0}to{opacity:1}}
@keyframes msgin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(61,220,151,.6)}70%{box-shadow:0 0 0 7px rgba(61,220,151,0)}100%{box-shadow:0 0 0 0 rgba(61,220,151,0)}}
@keyframes reel{from{transform:translateY(-8px)}to{transform:translateY(8px)}}
@keyframes deal{from{opacity:0;transform:translateY(-18px) rotate(-8deg)}to{opacity:1;transform:none}}
@keyframes fall{from{transform:translateY(-260px)}to{transform:translateY(0)}}
@keyframes toastin{from{opacity:0;transform:translateY(-14px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideup{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes spinwheel{to{transform:rotate(1440deg)}}
.flip{animation:flip .6s}
@keyframes flip{0%{transform:rotateY(0)}100%{transform:rotateY(720deg)}}
.callpulse{animation:callpulse 1s ease-in-out infinite}
@keyframes callpulse{0%,100%{transform:scale(1)}50%{transform:scale(1.16)}}

/* avatars-photo */
.avatar.photo{background-size:cover;background-position:center;color:transparent}
.avatar.clickable{cursor:pointer;transition:transform .15s}
.avatar.clickable:hover{transform:scale(1.06)}

/* server rail (colonne façon Discord) */
.serverrail{width:70px;background:rgba(0,0,0,.32);border-right:1px solid var(--stroke);
  display:flex;flex-direction:column;align-items:center;gap:10px;padding:12px 0;overflow-y:auto;flex-shrink:0}
.srv-ico{width:48px;height:48px;border-radius:16px;background:var(--panel2);border:1px solid var(--stroke);
  display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;cursor:pointer;
  transition:.18s;position:relative;background-size:cover;background-position:center;flex-shrink:0}
.srv-ico:hover{border-radius:14px;transform:translateY(-2px)}
.srv-ico.on{border-radius:14px;box-shadow:0 0 0 3px var(--accent)}
.srv-ico.home{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.srv-ico.add{color:var(--green);border-style:dashed}
.srv-sep{width:34px;height:1px;background:var(--stroke);flex-shrink:0}

/* channels & voice roster */
.chan{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:10px;cursor:pointer;transition:.12s;color:var(--muted);font-weight:600;font-size:14px}
.chan:hover{background:var(--panel);color:var(--text)}
.chan.on{background:var(--panel2);color:var(--text)}
.chan .hash{opacity:.7}
.chan.voice.live{color:var(--green)}
.voice-roster{padding:2px 0 8px 30px;display:flex;flex-direction:column;gap:5px}
.voice-mem{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--muted)}
.voice-mem .avatar{width:22px;height:22px;font-size:11px}
.srv-members{border-top:1px solid var(--stroke);padding:8px}
.mem-row{display:flex;align-items:center;gap:9px;padding:6px 8px;border-radius:9px;cursor:pointer}
.mem-row:hover{background:var(--panel)}
.mem-row .avatar{width:30px;height:30px;font-size:13px}
.mem-row .nm{flex:1;font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* member picker (liste à cocher) */
.pick{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:11px;cursor:pointer;transition:.12s}
.pick:hover{background:var(--panel)}
.pick.sel{background:var(--panel2)}
.pick .avatar{width:32px;height:32px;font-size:14px}
.pick .nm{flex:1;font-weight:600}
.pick .chk{width:22px;height:22px;border-radius:7px;border:2px solid var(--stroke);display:flex;align-items:center;justify-content:center;font-size:14px}
.pick.sel .chk{background:var(--accent);border-color:transparent}
.picklist{max-height:46vh;overflow-y:auto;margin:8px 0 4px}

/* profil */
.prof-banner{height:78px;border-radius:16px 16px 0 0;margin:-22px -22px 0;background:linear-gradient(135deg,var(--accent),var(--accent2))}
.prof-av{width:92px;height:92px;border-radius:50%;margin:-46px auto 8px;border:4px solid #1a1030;font-size:36px;background-size:cover;background-position:center;
  display:flex;align-items:center;justify-content:center;font-weight:800;background-color:var(--accent)}
.prof-name{text-align:center;font-size:22px;font-weight:800}
.prof-bio{text-align:center;color:var(--muted);margin:8px 14px;white-space:pre-wrap;word-wrap:break-word}
.swatches{display:flex;gap:8px;flex-wrap:wrap;margin:6px 0 14px}
.swatch{width:30px;height:30px;border-radius:50%;cursor:pointer;border:2px solid transparent}
.swatch.on{border-color:#fff;box-shadow:0 0 0 2px var(--accent)}

/* barres flottantes appel / vocal (non bloquantes) */
.floatbar{position:fixed;right:16px;bottom:16px;z-index:70;background:linear-gradient(160deg,#241748,#180f30);
  border:1px solid var(--stroke);border-radius:16px;padding:12px 14px;box-shadow:var(--shadow);min-width:230px;max-width:86vw;animation:pop .3s cubic-bezier(.2,.9,.3,1.25)}
.floatbar.voice{border-color:rgba(61,220,151,.4)}
.floatbar .fb-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.floatbar .fb-ic{font-size:24px}
.floatbar .fb-nm{font-weight:700;font-size:15px}
.floatbar .fb-sub{color:var(--muted);font-size:12px}
.floatbar .fb-actions{display:flex;gap:8px}
.floatbar .fb-actions .btn{flex:1}
.fb-roster{display:flex;flex-wrap:wrap;gap:6px;margin:2px 0 9px}
.fb-roster .avatar{width:26px;height:26px;font-size:12px;border:2px solid transparent}
.incoming-banner{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:75;
  background:linear-gradient(135deg,#241748,#33194a);border:1px solid var(--accent);border-radius:16px;
  padding:12px 16px;box-shadow:var(--shadow);display:flex;align-items:center;gap:12px;animation:toastin .3s cubic-bezier(.2,.9,.3,1.3)}
.incoming-banner .ib-ic{font-size:28px}
.incoming-banner .ib-actions{display:flex;gap:8px}

/* menu contextuel volume/muet (clic droit) */
.ctxmenu{position:fixed;z-index:120;background:linear-gradient(160deg,#2a1a52,#1a1030);border:1px solid var(--stroke);
  border-radius:14px;padding:12px;box-shadow:var(--shadow);width:200px;animation:pop .15s}
.ctxmenu .ctx-name{font-weight:700;margin-bottom:8px;text-align:center}
.ctxmenu .ctx-row{display:flex;align-items:center;gap:8px;font-size:13px}
.ctxmenu input[type=range]{flex:1;accent-color:var(--accent)}
.ctxmenu .ctx-row span:last-child{min-width:38px;text-align:right;color:var(--muted)}

/* panneau de partage d'écran (flottant, non bloquant) */
.screens{position:fixed;top:64px;left:50%;transform:translateX(-50%);z-index:65;width:min(680px,92vw);
  background:rgba(10,6,24,.92);border:1px solid var(--stroke);border-radius:16px;box-shadow:var(--shadow);overflow:hidden}
.screens .scr-head{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;
  font-weight:700;font-size:13px;border-bottom:1px solid var(--stroke);cursor:default}
.screens.min .scr-grid{display:none}
.scr-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:8px;padding:10px;max-height:60vh;overflow-y:auto}
.scr-item{position:relative;background:#000;border-radius:10px;overflow:hidden}
.scr-item video{width:100%;display:block;aspect-ratio:16/9;object-fit:contain;background:#000;cursor:pointer}
.scr-item .scr-label{position:absolute;left:6px;bottom:6px;background:rgba(0,0,0,.6);border-radius:8px;
  padding:2px 8px;font-size:12px;font-weight:600}

@media(max-width:720px){
  .serverrail{width:56px}.srv-ico{width:42px;height:42px;font-size:19px}
  .sidebar{width:100%;position:absolute;inset:0 0 0 56px;z-index:10;transition:transform .28s}
  .sidebar.tuck{transform:translateX(-100%)}
  .chat{position:absolute;inset:0}
  .back-btn{display:flex!important}
  .morpion{grid-template-columns:repeat(3,72px)} .cell{height:72px;font-size:38px}
  .floatbar{right:8px;left:8px;bottom:8px;min-width:0}
}
.back-btn{display:none}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-card">
    <div class="logo"><span class="em">💬</span> papote</div>
    <div class="subtitle">chat & jeux, direct dans ton navigateur</div>
    <div class="tabs">
      <button class="tab on" id="tab-login">Se connecter</button>
      <button class="tab" id="tab-reg">Créer un compte</button>
    </div>
    <input class="field" id="in-user" placeholder="Nom d'utilisateur" autocomplete="username">
    <input class="field" id="in-pass" type="password" placeholder="Mot de passe" autocomplete="current-password">
    <button class="btn" id="do-auth" style="width:100%;margin-top:6px">Se connecter</button>
    <div class="err" id="login-err"></div>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <div class="topbar">
    <button class="iconbtn back-btn" id="back-btn">‹</button>
    <div class="brand">💬</div>
    <div class="chip" id="me-chip" style="cursor:pointer" title="Mon profil">👤 <span id="me-name"></span></div>
    <div class="chip coins">🪙 <span id="me-balance">0</span></div>
    <div class="spacer"></div>
    <button class="iconbtn" id="nav-calls" title="Historique des appels">📞</button>
    <button class="iconbtn" id="nav-notif" title="Activer les notifications">🔔</button>
    <button class="iconbtn" id="nav-online" title="En ligne">🌐</button>
    <button class="iconbtn" id="nav-casino" title="Casino">🎰</button>
    <button class="iconbtn" id="nav-stats" title="Stats">📊</button>
    <button class="iconbtn" id="nav-board" title="Classement">🏆</button>
    <button class="iconbtn" id="nav-logout" title="Déconnexion">⎋</button>
  </div>
  <div class="body">
    <div class="serverrail" id="serverrail"></div>
    <div class="sidebar" id="sidebar">
      <div id="home-side" style="display:flex;flex-direction:column;min-height:0;flex:1">
        <div class="side-head">
          <button class="btn sm" id="add-friend">➕ Ami</button>
          <button class="btn sm ghost" id="new-group">👥 Groupe</button>
        </div>
        <div class="convos" id="convos"></div>
      </div>
      <div id="server-side" class="hidden" style="flex-direction:column;min-height:0;flex:1"></div>
    </div>
    <div class="chat">
      <div class="chat-head" id="chat-head">
        <button class="iconbtn back-btn" id="back-btn2">‹</button>
        <div style="flex:1">
          <div class="nm" id="chat-title">Choisis une conversation</div>
          <div class="sub" id="chat-sub"></div>
        </div>
        <button class="btn sm green" id="btn-call" title="Appel vocal" style="display:none">📞</button>
        <button class="btn sm ghost" id="btn-gadd" title="Ajouter un membre" style="display:none">➕</button>
        <button class="btn sm pink" id="btn-duel">⚔️ Défier</button>
      </div>
      <div class="log" id="log">
        <div class="empty"><div class="big">💬</div><div>Sélectionne un ami ou un groupe à gauche pour commencer à papoter.</div></div>
      </div>
      <div class="composer">
        <button class="iconbtn" id="btn-attach" title="Envoyer une image">📎</button>
        <button class="iconbtn" id="btn-emoji" title="Emoji">😀</button>
        <input type="file" id="img-input" accept="image/*" style="display:none">
        <input class="field" id="composer" placeholder="Écris un message…" autocomplete="off">
        <button class="btn" id="send-btn">Envoyer</button>
      </div>
    </div>
  </div>
</div>

<div id="toasts"></div>
<div id="reconnect" class="hidden">Reconnexion au serveur…</div>
<div id="overlays"></div>
<div id="call-ui"></div>
<audio id="call-audio" autoplay playsinline></audio>
<div id="voice-audios" style="display:none"></div>

<script>
"use strict";
const $=(s,r=document)=>r.querySelector(s);
const el=(t,c,txt)=>{const e=document.createElement(t);if(c)e.className=c;if(txt!=null)e.textContent=txt;return e};
const esc=s=>String(s==null?"":s).replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]));
const store={get:k=>{try{return localStorage.getItem(k)}catch(e){return null}},
             set:(k,v)=>{try{localStorage.setItem(k,v)}catch(e){}},
             del:k=>{try{localStorage.removeItem(k)}catch(e){}}};

const S={ws:null,token:store.get("papote_token"),username:"",balance:0,
  friends:[],groups:[],servers:[],current:null,unread:{},duel:null,connected:false,
  reconnectTimer:null,delay:600,authMode:"login",pendingInvite:null,
  call:null,pendingCall:null,profile:{},profiles:{},voice:null,
  view:"home",activeServer:null,reactions:{}};
let pendingIce=[];

/* ---------- point d'extension local (remplacé si un module est présent) ---------- */
function extMsg(m){}
function extReady(){}

/* ---------- cache des cartes de profil (photo + couleur) ---------- */
function cacheCard(c){
  if(!c||!c.username)return;
  const p=S.profiles[c.username]||(S.profiles[c.username]={});
  if(c.avatar!=null)p.avatar=c.avatar;
  if(c.accent!=null)p.accent=c.accent;
}
function cacheAll(list){(list||[]).forEach(cacheCard);}
function avatarEl(username,extra){
  const c=S.profiles[username]||{};
  const a=el("div","avatar"+(extra?" "+extra:""));
  if(c.avatar&&c.avatar.indexOf("data:")===0){a.classList.add("photo");a.style.backgroundImage=`url("${c.avatar}")`;}
  else if(c.avatar){a.textContent=c.avatar;}
  else{a.textContent=(username&&username[0]?username[0].toUpperCase():"?");
    if(c.accent)a.style.background=`linear-gradient(135deg,${c.accent},var(--accent2))`;}
  return a;
}
function avatarStyle(username){
  const c=S.profiles[username]||{};
  if(c.avatar&&c.avatar.indexOf("data:")===0)return `background-image:url("${c.avatar}");background-size:cover;background-position:center;color:transparent`;
  if(c.accent)return `background:linear-gradient(135deg,${c.accent},var(--accent2))`;
  return "";
}

/* ---------- WebSocket ---------- */
function wsURL(){
  const p=location.protocol==="https:"?"wss:":"ws:";
  return p+"//"+location.host+"/";
}
function connect(){
  clearTimeout(S.reconnectTimer);
  let ws;
  try{ws=new WebSocket(wsURL())}catch(e){scheduleReconnect();return}
  S.ws=ws;
  ws.onopen=()=>{
    S.connected=true;S.delay=600;$("#reconnect").classList.add("hidden");
    if(S.token) send("auth",{token:S.token});
  };
  ws.onmessage=e=>{let m;try{m=JSON.parse(e.data)}catch(_){return}route(m)};
  ws.onclose=()=>{S.connected=false;scheduleReconnect()};
  ws.onerror=()=>{try{ws.close()}catch(e){}};
}
function scheduleReconnect(){
  if(!$("#app").classList.contains("hidden")) $("#reconnect").classList.remove("hidden");
  S.reconnectTimer=setTimeout(connect,S.delay);
  S.delay=Math.min(S.delay*1.6,5000);
}
function send(op,extra){
  if(S.ws&&S.ws.readyState===1) S.ws.send(JSON.stringify(Object.assign({op},extra||{})));
}

/* ---------- routing ---------- */
function route(m){ extMsg(m); if(m.ev) onEvent(m); else if(m.reply) onReply(m); }

function onReply(m){
  if(!m.ok){
    if(["register","login","auth"].includes(m.reply)){
      if(m.reply==="auth"){S.token=null;store.del("papote_token");showLogin();}
      $("#login-err").textContent=m.error||"Erreur.";
    } else {
      toast(m.error||"Erreur.","err");
      if(m.reply&&m.reply.indexOf("call")===0) endCall(false);
    }
    return;
  }
  switch(m.reply){
    case "register": case "login": case "auth":
      S.token=m.token; store.set("papote_token",m.token);
      S.username=m.username; S.friends=m.friends||[]; S.groups=m.groups||[];
      S.servers=m.servers||[]; S.profile=m.profile||{username:m.username};
      cacheCard(S.profile); cacheAll(S.friends);
      S.servers.forEach(s=>cacheAll(s.members));
      enterApp(); send("casino_state"); break;
    case "friend_list": case "friend_add": case "friend_accept":
      if(m.friends){S.friends=m.friends;cacheAll(m.friends);renderSidebar();} break;
    case "group_create": S.groups=m.groups||S.groups; renderSidebar(); break;
    case "group_add": if(m.group){mergeGroup(m.group);toast("✅ Membre(s) ajouté(s) à « "+m.group.name+" »","ok");closeOverlays();} break;
    case "profile_get": showProfileCard(m.profile); break;
    case "profile_update": S.profile=m.profile; cacheCard(m.profile); toast("✅ Profil mis à jour","ok"); closeOverlays(); renderSidebar(); break;
    case "server_create": S.servers=m.servers||S.servers; renderServerRail(); if(m.server){openServer(m.server.id);} toast("✅ Serveur créé","ok"); closeOverlays(); break;
    case "server_add": if(m.server){mergeServer(m.server);toast("✅ Membre(s) ajouté(s)","ok");closeOverlays();} break;
    case "server_list": S.servers=m.servers||[]; S.servers.forEach(s=>cacheAll(s.members)); renderServerRail(); break;
    case "channel_create": if(m.server){mergeServer(m.server);toast("✅ Salon créé","ok");closeOverlays();} break;
    case "voice_join": onVoiceJoined(m); break;
    case "call_history": renderCallHistory(m.calls||[]); break;
    case "history":
      renderHistory(m); break;
    case "casino_state": setBalance(m.balance); break;
    case "casino_play": setBalance(m.balance); casinoResult(m); break;
    case "casino_bonus": setBalance(m.balance); toast("🎁 Bonus encaissé !","ok"); refreshCasinoBalance(); break;
    case "blackjack": setBalance(m.balance); bjRender(m); break;
    case "leaderboard": renderLeaderboard(m.players||[]); break;
    case "who_online": renderOnline(m.users||[]); break;
    case "stats": renderStats(m); break;
    case "game_history": renderGameHistory(m.games||[]); break;
    case "duel_challenge": toast("Défi envoyé à "+m.opponent+" — en attente…"); break;
  }
}

function onEvent(m){
  switch(m.ev){
    case "message": incoming(m.msg); break;
    case "friend_request": toast("📨 Demande d'ami de "+m.from); notify("📨 Demande d'ami","de "+m.from); beep(); send("friend_list"); break;
    case "friend_accepted": toast(m.username+" a accepté ta demande !","ok"); send("friend_list"); break;
    case "group_added": {
      const known=S.groups.some(g=>g.id===m.group.id);
      mergeGroup(m.group);
      if(!known){toast("Ajouté au groupe « "+m.group.name+" »"); notify("👥 Nouveau groupe",m.group.name); beep();}
      break;
    }
    case "presence":
      S.friends.forEach(f=>{if(f.username===m.username)f.online=m.online});
      S.servers.forEach(s=>(s.members||[]).forEach(mm=>{if(mm.username===m.username)mm.online=m.online}));
      renderSidebar(); if(S.view==="server")renderServer(); break;
    case "profile_updated": cacheCard(m.card); renderSidebar(); if(S.view==="server")renderServer(); break;
    case "server_added": mergeServer(m.server); toast("Ajouté au serveur « "+m.server.name+" » 🎉"); notify("🏠 Nouveau serveur",m.server.name); beep(); break;
    case "server_updated": mergeServer(m.server); break;
    case "voice_state": onVoiceState(m); break;
    case "voice_peer_join": onVoicePeerJoin(m); break;
    case "voice_peer_leave": onVoicePeerLeave(m); break;
    case "voice_signal": onVoiceSignal(m); break;
    case "reaction": onReaction(m); break;
    case "duel_invite": showInvite(m); notify("⚔️ Défi de "+m.from,"Partie de "+m.game); beep(); break;
    case "call_incoming": onCallIncoming(m); break;
    case "call_answered": onCallAnswered(m); break;
    case "call_ice": onCallIce(m); break;
    case "call_declined": toast(m.from+" a refusé l'appel.","err"); endCall(false); break;
    case "call_ended": toast(m.from+" a raccroché."); endCall(false); break;
    case "duel_start": openDuel(m); break;
    case "duel_update": if(S.duel&&S.duel.mid===m.match_id){S.duel.board=m.board;S.duel.turn=m.turn;renderDuel();} break;
    case "duel_over": setBalance(m.balance); if(S.duel&&S.duel.mid===m.match_id){S.duel.board=m.board;S.duel.over=true;S.duel.result=m.result;S.duel.delta=m.delta;S.duel.winner=m.winner;renderDuel();} break;
    case "duel_declined": toast(m.by+" a refusé ton défi.","err"); break;
    case "duel_cancel": toast(m.reason||"Partie annulée.","err"); closeOverlays(); S.duel=null; break;
  }
}

/* ---------- LOGIN ---------- */
$("#tab-login").onclick=()=>setAuthMode("login");
$("#tab-reg").onclick=()=>setAuthMode("register");
function setAuthMode(mode){
  S.authMode=mode;
  $("#tab-login").classList.toggle("on",mode==="login");
  $("#tab-reg").classList.toggle("on",mode==="register");
  $("#do-auth").textContent=mode==="login"?"Se connecter":"Créer mon compte";
  $("#in-pass").autocomplete=mode==="login"?"current-password":"new-password";
  $("#login-err").textContent="";
}
$("#do-auth").onclick=doAuth;
$("#in-pass").addEventListener("keydown",e=>{if(e.key==="Enter")doAuth()});
$("#in-user").addEventListener("keydown",e=>{if(e.key==="Enter")$("#in-pass").focus()});
function doAuth(){
  const u=$("#in-user").value.trim(), p=$("#in-pass").value;
  if(!u||!p){$("#login-err").textContent="Remplis les deux champs.";return;}
  $("#login-err").textContent="Connexion…";
  send(S.authMode,{username:u,password:p});
}
function showLogin(){$("#app").classList.add("hidden");$("#login").classList.remove("hidden");}

/* ---------- APP ---------- */
function enterApp(){
  $("#login").classList.add("hidden"); $("#app").classList.remove("hidden");
  $("#me-name").textContent=S.username;
  extReady();
  if(S.view==="server"&&S.servers.some(s=>s.id===S.activeServer))openServer(S.activeServer);
  else goHome();
  initAudio();
  if(("Notification" in window)&&Notification.permission==="default"){
    try{Notification.requestPermission()}catch(e){}
  }
}
function setBalance(b){ if(typeof b==="number"){S.balance=b; $("#me-balance").textContent=b;} }

$("#nav-logout").onclick=()=>{S.token=null;store.del("papote_token");if(S.ws)S.ws.close();location.reload();};
$("#nav-notif").onclick=enableNotifications;
$("#nav-calls").onclick=()=>{openCallHistory();send("call_history",{limit:40});};
$("#me-chip").onclick=openMyProfile;
$("#btn-call").onclick=()=>{if(S.current&&S.current.type==="dm")startCall(S.current.id);};
$("#nav-online").onclick=()=>{openOnline();send("who_online");};
$("#nav-casino").onclick=openCasino;
$("#nav-stats").onclick=()=>{openStats();send("stats");send("game_history",{limit:20});};
$("#nav-board").onclick=()=>{openLeaderboard();send("leaderboard");};
$("#add-friend").onclick=()=>promptModal("Ajouter un ami","nom d'utilisateur",v=>{if(v)send("friend_add",{username:v})});
$("#new-group").onclick=newGroup;
$("#back-btn").onclick=$("#back-btn2").onclick=()=>$("#sidebar").classList.remove("tuck");

/* ---------- sidebar ---------- */
function convoKey(c){return c.type+":"+c.id}
function renderSidebar(){
  const box=$("#convos"); box.innerHTML="";
  const incoming=S.friends.filter(f=>f.kind==="incoming");
  if(incoming.length){
    box.appendChild(sectionLabel("Demandes d'ami"));
    incoming.forEach(f=>{
      const r=el("div","convo");
      r.innerHTML=`<div class="avatar">${esc(f.username[0].toUpperCase())}</div><div class="nm">${esc(f.username)}</div>`;
      const acc=el("button","btn sm green","Accepter");
      acc.onclick=e=>{e.stopPropagation();send("friend_accept",{username:f.username});};
      r.appendChild(acc); box.appendChild(r);
    });
  }
  const friends=S.friends.filter(f=>f.kind==="friend");
  box.appendChild(sectionLabel("Amis"));
  if(!friends.length && !S.groups.length){
    const e=el("div","hint","Ajoute un ami avec ➕ ou via 🌐 pour commencer.");
    e.style.padding="6px 10px"; box.appendChild(e);
  }
  friends.forEach(f=>box.appendChild(convoRow({type:"dm",id:f.username},f.username,f.online)));
  S.friends.filter(f=>f.kind==="outgoing").forEach(f=>{
    const r=el("div","convo pending");
    r.innerHTML=`<div class="avatar">${esc(f.username[0].toUpperCase())}</div><div class="nm">⏳ ${esc(f.username)}</div>`;
    box.appendChild(r);
  });
  if(S.groups.length){
    box.appendChild(sectionLabel("Groupes"));
    S.groups.forEach(g=>box.appendChild(convoRow({type:"grp",id:g.id},g.name,null,true)));
  }
}
function sectionLabel(t){return el("div","section-label",t)}
function convoRow(c,name,online,isGroup){
  const r=el("div","convo"); if(S.current&&convoKey(S.current)===convoKey(c))r.classList.add("on");
  let av;
  if(isGroup){av=el("div","avatar grp");av.textContent="👥";}
  else av=avatarEl(name);
  r.appendChild(av);
  if(!isGroup){const d=el("div","dot"+(online?" on":"")); r.appendChild(d);}
  r.appendChild(el("div","nm",name));
  const u=S.unread[convoKey(c)]; if(u)r.appendChild(el("div","badge",String(u)));
  r.onclick=()=>openConversation(c,name,isGroup);
  return r;
}

/* ---------- chat ---------- */
function openConversation(c,name,isGroup){
  S.current=c; delete S.unread[convoKey(c)];
  const isChannel=c.type==="channel";
  $("#chat-title").textContent=(isChannel?"# ":isGroup?"👥 ":"💬 ")+name;
  $("#btn-duel").style.display=c.type==="dm"?"":"none";
  $("#btn-call").style.display=c.type==="dm"?"":"none";
  $("#btn-gadd").style.display=isGroup?"":"none";
  let sub="";
  if(isGroup){const g=S.groups.find(x=>x.id===c.id); sub=g?g.members.join(", "):"";}
  else if(isChannel){const s=S.servers.find(x=>x.id===c.serverId); sub=s?"🏠 "+s.name:"";}
  $("#chat-sub").textContent=sub;
  $("#chat-title").onclick=c.type==="dm"?(()=>send("profile_get",{username:c.id})):null;
  $("#chat-title").style.cursor=c.type==="dm"?"pointer":"";
  $("#log").innerHTML="";
  if(S.view==="server")renderServer(); else renderSidebar();
  renderServerRail();
  if(window.innerWidth<=720)$("#sidebar").classList.add("tuck");
  const wt=c.type==="dm"?"dm":c.type==="grp"?"group":"channel";
  send("history",{with_type:wt,with:c.id});
}
function renderHistory(m){
  const c=m.with_type==="dm"?{type:"dm",id:m.with}:m.with_type==="group"?{type:"grp",id:m.with}:{type:"channel",id:m.with};
  if(!S.current||convoKey(S.current)!==convoKey(c))return;
  $("#log").innerHTML="";
  (m.messages||[]).forEach(writeMsg);
  scrollLog();
}
function incoming(msg){
  if(msg.to_type==="channel"&&msg.avatar!=null)cacheCard({username:msg.from,avatar:msg.avatar});
  let key;
  if(msg.to_type==="dm")key="dm:"+(msg.from===S.username?msg.to:msg.from);
  else if(msg.to_type==="group")key="grp:"+msg.to;
  else key="channel:"+msg.to;
  const isCurrent=S.current&&convoKey(S.current)===key;
  if(isCurrent){writeMsg(msg);scrollLog();}
  else{S.unread[key]=(S.unread[key]||0)+1;renderSidebar();renderServerRail();if(S.view==="server")renderServer();}
  if(msg.from!==S.username){
    const preview=msg.body?msg.body.slice(0,120):(msg.attachment?"📷 image":"");
    if(!isCurrent)toast("💬 "+msg.from+" : "+preview.slice(0,40));
    if(!isCurrent||document.hidden){
      const label=(msg.to_type==="group"?"👥 ":msg.to_type==="channel"?"# ":"💬 ")+msg.from;
      notify(label,preview); beep();
    }
  }
}
function writeMsg(msg){
  if(msg.avatar!=null)cacheCard({username:msg.from,avatar:msg.avatar});
  const mine=msg.from===S.username;
  const isDuel=(msg.body||"").startsWith("⚔️");
  const m=el("div","msg "+(isDuel?"duel":mine?"me":"them"));
  m.dataset.mid=msg.id;
  if(!isDuel && (!mine || S.current.type!=="dm")) m.appendChild(el("div","who",msg.from));

function compressImage(file,maxDim,maxLen,cb){
  const rd=new FileReader();
  rd.onload=()=>{const img=new Image();
    img.onload=()=>{
      let w=img.width,h=img.height;const scale=Math.min(1,maxDim/Math.max(w,h));
      w=Math.max(1,Math.round(w*scale));h=Math.max(1,Math.round(h*scale));
      const cv=document.createElement("canvas");
      const draw=()=>{cv.width=w;cv.height=h;cv.getContext("2d").drawImage(img,0,0,w,h);};
      draw();
      let q=0.85,data;
      try{data=cv.toDataURL("image/jpeg",q);}catch(e){toast("Image illisible.","err");return;}
      while(data.length>maxLen&&q>0.32){q-=0.12;data=cv.toDataURL("image/jpeg",q);}
      let guard=0;
      while(data.length>maxLen&&guard<5&&(w>320||h>320)){w=Math.round(w*0.8);h=Math.round(h*0.8);draw();data=cv.toDataURL("image/jpeg",0.7);guard++;}
      if(data.length>maxLen){toast("Image trop lourde, même compressée.","err");return;}
      cb(data);
    };
    img.onerror=()=>toast("Image illisible.","err");img.src=rd.result;};
  rd.onerror=()=>toast("Lecture impossible.","err");rd.readAsDataURL(file);
}

  container.innerHTML="";

  candidates.forEach(u=>{

/* ---------- salons vocaux (mesh WebRTC : voix + partage d'écran) ---------- */
const SCREEN_PRESETS={"720p":{w:1280,h:720},"1080p":{w:1920,h:1080},"1440p":{w:2560,h:1440},"source":null};
function toggleVoice(cid,sid){if(S.voice&&S.voice.cid===cid)leaveVoice(false);else joinVoice(cid,sid);}
async function joinVoice(cid,sid){
  if(S.call||S.pendingCall){toast("Tu es déjà en appel privé.","err");return;}
  if(!callSupported()){toast("Vocal non supporté par ce navigateur.","err");return;}
  if(!window.isSecureContext){toast("Le vocal nécessite l'URL https (le tunnel).","err");return;}
  initAudio();
  if(S.voice)await leaveVoice(true);
  let stream;
  try{stream=await navigator.mediaDevices.getUserMedia({audio:true});}
  catch(e){toast("Micro inaccessible (autorise-le).","err");return;}
  S.voice={cid,sid,stream,screen:null,muted:false,peers:{},joinedAt:Date.now()};
  send("voice_join",{channel_id:cid});
  startBarTimer(); updateVoiceBar(); renderServer();
}
function voicePeer(username){
  const pc=new RTCPeerConnection({iceServers:ICE_SERVERS});
  const polite=S.username<username;   // rôle déterministe pour la renégociation "parfaite"
  const entry={pc,username,polite,makingOffer:false,ignoreOffer:false,
    gain:1,pmuted:false,gainNode:null,srcNode:null,sinkEl:null,videoEl:null,hasVideo:false};
  S.voice.peers[username]=entry;
  try{entry.gainNode=audioCtx.createGain();entry.gainNode.gain.value=1;entry.gainNode.connect(audioCtx.destination);}catch(_){}
  pc.onicecandidate=e=>{if(e.candidate&&S.voice)send("voice_signal",{channel_id:S.voice.cid,to:username,kind:"ice",data:JSON.stringify(e.candidate)});};
  pc.onnegotiationneeded=async()=>{
    try{entry.makingOffer=true;await pc.setLocalDescription();
      send("voice_signal",{channel_id:S.voice.cid,to:username,kind:"sdp",data:JSON.stringify(pc.localDescription)});}
    catch(_){}finally{entry.makingOffer=false;}
  };
  pc.ontrack=e=>onRemoteTrack(entry,e);
  pc.onconnectionstatechange=()=>{if(["failed","closed"].indexOf(pc.connectionState)>=0)dropVoicePeer(username);};
  S.voice.stream.getTracks().forEach(t=>pc.addTrack(t,S.voice.stream));
  if(S.voice.screen)S.voice.screen.getTracks().forEach(t=>pc.addTrack(t,S.voice.screen));
  return entry;
}
function onRemoteTrack(entry,e){
  const track=e.track, stream=e.streams[0]||new MediaStream([track]);
  if(track.kind==="video"){
    entry.hasVideo=true;
    let v=entry.videoEl;
    if(!v){v=el("video");v.autoplay=true;v.playsInline=true;v.muted=true;}
    v.srcObject=stream; entry.videoEl=v;
    track.onended=()=>{entry.hasVideo=false;if(entry.videoEl){entry.videoEl.remove();entry.videoEl=null;}renderScreens();};
    renderScreens();
  }else{
    if(!entry.sinkEl){const a=el("audio");a.autoplay=true;a.playsInline=true;$("#voice-audios").appendChild(a);entry.sinkEl=a;}
    entry.sinkEl.srcObject=stream;
    if(entry.gainNode){
      try{if(entry.srcNode)entry.srcNode.disconnect();
        entry.srcNode=audioCtx.createMediaStreamSource(stream);entry.srcNode.connect(entry.gainNode);
        entry.sinkEl.muted=true;}                 // le son sort via WebAudio (volume réglable)
      catch(_){entry.sinkEl.muted=false;entry.sinkEl.volume=Math.min(1,entry.gain);}
    }else{entry.sinkEl.muted=false;entry.sinkEl.volume=Math.min(1,entry.gain);}
    applyPeerGain(entry);
  }
}
function onVoiceJoined(m){
  if(!S.voice||S.voice.cid!==m.channel_id)return;
  (m.peers||[]).forEach(p=>{if(p!==S.username&&!S.voice.peers[p])voicePeer(p);});
  updateVoiceBar();
}
async function onVoiceSignal(m){
  if(!S.voice||S.voice.cid!==m.channel_id)return;
  const from=m.from; let e=S.voice.peers[from]; if(!e)e=voicePeer(from);
  const pc=e.pc;
  if(m.kind==="ice"){let c;try{c=JSON.parse(m.data)}catch(_){return}
    try{await pc.addIceCandidate(c)}catch(err){if(!e.ignoreOffer){/* ignore */}} return;}
  let desc; try{desc=JSON.parse(m.data)}catch(_){return}
  const collision=desc.type==="offer"&&(e.makingOffer||pc.signalingState!=="stable");
  e.ignoreOffer=!e.polite&&collision;
  if(e.ignoreOffer)return;
  try{
    await pc.setRemoteDescription(desc);
    if(desc.type==="offer"){
      await pc.setLocalDescription();
      send("voice_signal",{channel_id:m.channel_id,to:from,kind:"sdp",data:JSON.stringify(pc.localDescription)});
    }
  }catch(_){}
}
function onVoicePeerJoin(m){/* il enverra son offre via negotiationneeded */}
function onVoicePeerLeave(m){if(S.voice&&S.voice.cid===m.channel_id){dropVoicePeer(m.username);updateVoiceBar();}}
function dropVoicePeer(username){
  const e=S.voice&&S.voice.peers[username]; if(!e)return;
  try{e.pc.close()}catch(_){}
  try{if(e.srcNode)e.srcNode.disconnect()}catch(_){}
  try{if(e.gainNode)e.gainNode.disconnect()}catch(_){}
  if(e.sinkEl){e.sinkEl.srcObject=null;e.sinkEl.remove();}
  if(e.videoEl){e.videoEl.remove();}
  delete S.voice.peers[username];
  renderScreens();
}
async function leaveVoice(switching){
  if(!S.voice)return;
  send("voice_leave",{});
  Object.keys(S.voice.peers).forEach(dropVoicePeer);
  try{S.voice.stream.getTracks().forEach(t=>t.stop())}catch(_){}
  if(S.voice.screen){try{S.voice.screen.getTracks().forEach(t=>t.stop())}catch(_){}}
  S.voice=null;
  if(!switching){if(!S.call)stopBarTimer();closeVoiceBar();renderScreens();renderServer();}
}
function onVoiceState(m){
  const s=S.servers.find(x=>x.id===m.server_id);
  if(s)s.voice=m.rooms||{};
  if(S.view==="server"&&S.activeServer===m.server_id)renderServer();
  if(S.voice&&S.voice.sid===m.server_id)updateVoiceBar();
}
function currentVoiceRoster(){
  if(!S.voice)return [];
  const s=S.servers.find(x=>x.id===S.voice.sid);
  if(s&&s.voice&&s.voice[String(S.voice.cid)])return s.voice[String(S.voice.cid)];

}
function channelName(sid,cid){const s=S.servers.find(x=>x.id===sid);
  const c=s&&(s.channels||[]).find(ch=>ch.id===cid);return c?c.name:"vocal";}

    <div class="hint" style="margin:7px 0 0;font-size:11px">clic droit sur un ami = volume / muet</div>`;
  const rb=$("#vb-roster",bar);

/* volume / muet par personne (clic droit) */
function openVolumeMenu(username,ev){

}
function closeVolumeMenu(){const m=$("#ctxmenu");if(m)m.remove();}
function setPeerVolume(username,g){const e=S.voice&&S.voice.peers[username];if(!e)return;e.gain=g;e.pmuted=(g===0);applyPeerGain(e);}
function togglePeerMute(username){const e=S.voice&&S.voice.peers[username];if(!e)return;e.pmuted=!e.pmuted;applyPeerGain(e);updateVoiceBar();}
function applyPeerGain(e){
  const g=e.pmuted?0:(e.gain||1);
  if(e.gainNode){try{e.gainNode.gain.value=g}catch(_){}}
  else if(e.sinkEl){e.sinkEl.muted=(g===0);e.sinkEl.volume=Math.min(1,g);}
}

/* partage d'écran + son du stream (résolution & fps au choix) */
async function pickScreenShare(){
  if(!S.voice){toast("Rejoins un vocal d'abord.","err");return;}
  if(S.voice.screen){stopScreenShare();return;}
  if(!navigator.mediaDevices||!navigator.mediaDevices.getDisplayMedia){toast("Partage d'écran non supporté ici.","err");return;}
  const ov=overlay(`<div class="sheet modal-sm"><h2>🖥️ Partager l'écran</h2>
    <div class="hint" style="margin:8px 0 4px">Résolution</div><div class="row" id="ss-res"></div>
    <div class="hint" style="margin:14px 0 4px">Images par seconde</div><div class="row" id="ss-fps"></div>
    <div class="hint" style="margin:12px 0 0">Le son de l'onglet/écran est partagé aussi 🔊</div>
    <div class="row center" style="margin-top:16px"><button class="btn green" id="ss-go">Partager</button>
    <button class="btn ghost" id="ss-cancel">Annuler</button></div></div>`);
  let res="1080p",fps=30;
  const resBox=$("#ss-res",ov);
  Object.keys(SCREEN_PRESETS).forEach(k=>{const b=el("button","btn sm"+(k===res?"":" ghost"),k==="source"?"Source":k);
    b.onclick=()=>{res=k;[...resBox.children].forEach(c=>c.classList.add("ghost"));b.classList.remove("ghost");};resBox.appendChild(b);});
  const fpsBox=$("#ss-fps",ov);
  [15,30,60].forEach(f=>{const b=el("button","btn sm"+(f===fps?"":" ghost"),f+" fps");
    b.onclick=()=>{fps=f;[...fpsBox.children].forEach(c=>c.classList.add("ghost"));b.classList.remove("ghost");};fpsBox.appendChild(b);});
  $("#ss-cancel",ov).onclick=closeOverlays;
  $("#ss-go",ov).onclick=async()=>{closeOverlays();await startScreenShare(res,fps);};
}
async function startScreenShare(res,fps){
  const p=SCREEN_PRESETS[res];
  const video=p?{width:{ideal:p.w},height:{ideal:p.h},frameRate:{ideal:fps,max:fps}}:{frameRate:{ideal:fps,max:fps}};
  let screen;
  try{screen=await navigator.mediaDevices.getDisplayMedia({video,audio:true});}
  catch(e){return;}
  if(!S.voice){screen.getTracks().forEach(t=>t.stop());return;}
  S.voice.screen=screen;
  Object.values(S.voice.peers).forEach(e=>screen.getTracks().forEach(t=>e.pc.addTrack(t,screen)));
  screen.getVideoTracks().forEach(t=>t.onended=()=>stopScreenShare());
  renderScreens(); updateVoiceBar(); toast("🖥️ Partage d'écran lancé","ok");
}
function stopScreenShare(){
  if(!S.voice||!S.voice.screen)return;
  const screen=S.voice.screen, tracks=screen.getTracks();
  Object.values(S.voice.peers).forEach(e=>{
    e.pc.getSenders().filter(s=>s.track&&tracks.indexOf(s.track)>=0).forEach(s=>{try{e.pc.removeTrack(s)}catch(_){}});
  });
  tracks.forEach(t=>t.stop());
  S.voice.screen=null;
  renderScreens(); updateVoiceBar();
}
function renderScreens(){
  let panel=$("#screens");
  const items=[];
  if(S.voice){
    if(S.voice.screen)items.push({user:S.username+" (toi)",stream:S.voice.screen});
    Object.values(S.voice.peers).forEach(e=>{if(e.videoEl)items.push({user:e.username,el:e.videoEl});});
  }
  if(!items.length){if(panel)panel.remove();return;}
  if(!panel){panel=el("div","screens");panel.id="screens";
    panel.innerHTML=`<div class="scr-head"><span>🖥️ Partages d'écran</span><button class="iconbtn" id="scr-min" style="width:28px;height:28px;font-size:14px">—</button></div><div class="scr-grid" id="scr-grid"></div>`;
    $("#call-ui").appendChild(panel);
    $("#scr-min",panel).onclick=()=>panel.classList.toggle("min");
  }
  const grid=$("#scr-grid",panel); grid.innerHTML="";
  items.forEach(it=>{
    const wrap=el("div","scr-item");
    let v=it.el;
    if(!v){v=el("video");v.autoplay=true;v.playsInline=true;v.muted=true;v.srcObject=it.stream;}
    if(v.play)v.play().catch(()=>{});
    v.onclick=()=>{if(v.requestFullscreen)v.requestFullscreen().catch(()=>{});};
    wrap.appendChild(v); wrap.appendChild(el("div","scr-label",it.user));
    grid.appendChild(wrap);
  });
}

/* chrono d'appel / de vocal */
let barTimer=null;
function startBarTimer(){if(!barTimer)barTimer=setInterval(updateBarTime,1000);updateBarTime();}
function stopBarTimer(){if(barTimer){clearInterval(barTimer);barTimer=null;}}
function fmtElapsed(ms){let s=Math.floor(ms/1000);const h=Math.floor(s/3600);s%=3600;const m=Math.floor(s/60);s%=60;
  const p=n=>String(n).padStart(2,"0");return (h?p(h)+":":"")+p(m)+":"+p(s);}
function updateBarTime(){
  if(S.voice&&S.voice.joinedAt){const t=$("#vb-time");if(t)t.textContent="⏱ "+fmtElapsed(Date.now()-S.voice.joinedAt);}
  if(S.call&&S.call.connectedAt){const t=$("#call-time");if(t)t.textContent="⏱ "+fmtElapsed(Date.now()-S.call.connectedAt);}
}

/* ---------- profils (photo, bio, couleur) ---------- */
const ACCENTS=["#8b7bff","#ff6fae","#3ddc97","#ffcf5c","#ff5c7a","#5cc8ff","#c77dff","#ff9f5c"];
function avatarStyle2(avatar,accent){
  if(avatar&&avatar.indexOf("data:")===0)return `background-image:url("${avatar}");background-size:cover;background-position:center;color:transparent`;
  if(accent)return `background:${accent}`; return "";
}
function avatarInner(avatar,username){
  if(avatar&&avatar.indexOf("data:")===0)return "";
  if(avatar)return esc(avatar);
  return esc((username&&username[0]?username[0]:"?").toUpperCase());
}
function resizeImage(file,max,cb){
  const rd=new FileReader();
  rd.onload=()=>{const img=new Image();
    img.onload=()=>{let w=img.width,h=img.height;const scale=Math.min(1,max/Math.max(w,h));
      w=Math.max(1,Math.round(w*scale));h=Math.max(1,Math.round(h*scale));
      const cv=document.createElement("canvas");cv.width=w;cv.height=h;
      cv.getContext("2d").drawImage(img,0,0,w,h);
      try{cb(cv.toDataURL("image/jpeg",0.82));}catch(e){toast("Image illisible.","err");}};
    img.onerror=()=>toast("Image illisible.","err");img.src=rd.result;};
  rd.onerror=()=>toast("Lecture impossible.","err");rd.readAsDataURL(file);

function fmtDur(sec){sec=Math.round(sec||0);if(sec<60)return sec+" s";const m=Math.floor(sec/60);return m+" min"+((sec%60)?" "+(sec%60)+" s":"");}
function renderCallHistory(calls){
  const box=$("#chist"); if(!box)return; box.innerHTML="";
  if(!calls.length){box.appendChild(el("div","hint","Aucun appel pour l'instant."));return;}
  const IC={answered:"✅",missed:"❌",declined:"🚫"};
  calls.forEach(c=>{
    const d=new Date(c.ts*1000), when=d.toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit"})+" "+fmtTime(c.ts);
    const arrow=c.direction==="out"?"↗️":"↘️";
    const detail=c.status==="answered"?fmtDur(c.duration):(c.status==="missed"?"manqué":"refusé");
    const r=el("div","list-row"); r.appendChild(avatarEl(c.with));
    const nm=el("div","nm"); nm.innerHTML=`${esc(c.with)} <span style="font-size:12px;color:var(--muted)">${arrow} ${when}</span>`;
    r.appendChild(nm); r.appendChild(el("div","hint",IC[c.status]+" "+detail));
    const cb=el("button","btn sm green","📞"); cb.onclick=()=>{closeOverlays();startCall(c.with);};
    r.appendChild(cb); box.appendChild(r);
  });
}

    const grid=el("div","p4grid");
    for(let i=0;i<42;i++){const cell=el("div","p4cell");const v=d.board[i];
      if(v!==""){const tok=el("div","tok "+(v==="0"?"r":"y"));cell.appendChild(tok);}grid.appendChild(cell);}
    wrap.appendChild(cols);wrap.appendChild(grid);board.appendChild(wrap);
  }
}
window.play=play;window.send=send;window.challenge=challenge;window.closeOverlays=closeOverlays;window.bet=bet;window.$=$;

/* ---------- son + notifications ---------- */
let audioCtx=null,ringTimer=null;
function initAudio(){
  try{
    if(!audioCtx)audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==="suspended")audioCtx.resume();
  }catch(e){}
}
function beep(freq,dur){
  if(!audioCtx)return;
  freq=freq||660; dur=dur||0.15;
  try{
    const o=audioCtx.createOscillator(),g=audioCtx.createGain(),t=audioCtx.currentTime;
    o.type="sine"; o.frequency.value=freq; o.connect(g); g.connect(audioCtx.destination);
    g.gain.setValueAtTime(0.0001,t);
    g.gain.exponentialRampToValueAtTime(0.22,t+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.start(t); o.stop(t+dur);
  }catch(e){}
}
function startRing(){stopRing();const r=()=>{beep(880,0.18);setTimeout(()=>beep(660,0.18),220);};r();ringTimer=setInterval(r,1600);}
function stopRing(){if(ringTimer){clearInterval(ringTimer);ringTimer=null;}}
function notify(title,body){
  try{
    if(("Notification" in window)&&Notification.permission==="granted"&&document.hidden){
      const n=new Notification(title,{body:body||"",tag:"papote"});
      setTimeout(()=>{try{n.close()}catch(e){}},6000);
    }
  }catch(e){}
}
function enableNotifications(){
  initAudio();
  if(!("Notification" in window)){toast("Notifications non supportées ici.","err");return;}
  if(Notification.permission==="granted"){toast("🔔 Notifications déjà actives.","ok");return;}
  if(Notification.permission==="denied"){toast("Notifications bloquées — réautorise-les dans le navigateur.","err");return;}
  Notification.requestPermission().then(p=>{
    toast(p==="granted"?"🔔 Notifications activées !":"Notifications refusées.",p==="granted"?"ok":"err");
  });
}
document.addEventListener("click",initAudio);

/* ---------- appels vocaux (WebRTC pair-à-pair) ---------- */
const ICE_SERVERS=[{urls:"stun:stun.l.google.com:19302"},{urls:"stun:stun1.l.google.com:19302"}];
function callSupported(){return !!(navigator.mediaDevices&&navigator.mediaDevices.getUserMedia&&window.RTCPeerConnection);}
function newPeer(peer){
  const pc=new RTCPeerConnection({iceServers:ICE_SERVERS});
  S.call={peer,pc,stream:null,status:"appel",muted:false,connectedAt:0};
  pc.onicecandidate=e=>{if(e.candidate)send("call_ice",{to:peer,cand:JSON.stringify(e.candidate)});};
  pc.ontrack=e=>{const a=$("#call-audio");if(a){a.srcObject=e.streams[0];a.play().catch(()=>{});}};
  pc.onconnectionstatechange=()=>{
    if(!S.call)return;
    const st=pc.connectionState;
    if(st==="connected"){S.call.status="connected";if(!S.call.connectedAt){S.call.connectedAt=Date.now();startBarTimer();}stopRing();updateCallUI();}
    else if(st==="disconnected"){S.call.status="reconnexion";updateCallUI();}
    else if(st==="failed"||st==="closed"){if(S.call){toast("Appel interrompu.","err");endCall(false);}}
  };
  return pc;
}
async function addLocalAudio(pc){
  const stream=await navigator.mediaDevices.getUserMedia({audio:true});
  if(S.call)S.call.stream=stream;
  stream.getTracks().forEach(t=>pc.addTrack(t,stream));
}
async function startCall(peer){
  if(S.voice){toast("Quitte le vocal avant de lancer un appel privé.","err");return;}
  if(S.call||S.pendingCall){toast("Tu es déjà en appel.","err");return;}
  if(!callSupported()){toast("Appels non supportés par ce navigateur.","err");return;}
  if(!window.isSecureContext){toast("Les appels nécessitent l'URL https (le tunnel).","err");return;}
  initAudio();
  const pc=newPeer(peer);
  showCallUI(peer,true);
  try{await addLocalAudio(pc);}catch(e){toast("Micro inaccessible (autorise-le).","err");endCall(false);return;}
  try{
    const offer=await pc.createOffer();
    await pc.setLocalDescription(offer);
    send("call_offer",{to:peer,sdp:JSON.stringify(offer)});
  }catch(e){toast("Échec de l'appel.","err");endCall(false);}
}
function onCallIncoming(m){
  if(S.call||S.pendingCall||S.voice){send("call_decline",{to:m.from});return;}
  if(!callSupported()){send("call_decline",{to:m.from});return;}
  S.pendingCall=m; initAudio(); startRing();
  notify("📞 Appel de "+m.from,"Appel vocal entrant"); toast("📞 "+m.from+" t'appelle…");
  showIncomingUI(m.from);
}
async function acceptCall(){
  const m=S.pendingCall; S.pendingCall=null; if(!m)return;
  stopRing();
  if(!window.isSecureContext){toast("Appels : ouvre l'URL https.","err");send("call_decline",{to:m.from});closeCallUI();return;}
  const pc=newPeer(m.from);
  S.call.status="connexion"; showCallUI(m.from,false);
  try{await addLocalAudio(pc);}catch(e){toast("Micro inaccessible (autorise-le).","err");send("call_decline",{to:m.from});endCall(false);return;}
  try{
    await pc.setRemoteDescription(JSON.parse(m.sdp)); flushIce();
    const ans=await pc.createAnswer();
    await pc.setLocalDescription(ans);
    send("call_answer",{to:m.from,sdp:JSON.stringify(ans)});
  }catch(e){toast("Échec de la connexion.","err");endCall(true);}
}
function declineCall(){
  const m=S.pendingCall; S.pendingCall=null; stopRing();
  if(m)send("call_decline",{to:m.from});
  closeCallUI();
}
async function onCallAnswered(m){
  if(!S.call||S.call.peer!==m.from)return;
  try{await S.call.pc.setRemoteDescription(JSON.parse(m.sdp)); flushIce(); S.call.status="connexion"; updateCallUI();}
  catch(e){endCall(true);}
}
function onCallIce(m){
  let cand; try{cand=JSON.parse(m.cand);}catch(e){return;}
  if(S.call&&S.call.peer===m.from&&S.call.pc.remoteDescription){
    S.call.pc.addIceCandidate(cand).catch(()=>{});
  }else pendingIce.push({from:m.from,cand});
}
function flushIce(){
  if(!S.call||!S.call.pc.remoteDescription)return;
  const keep=[];
  pendingIce.forEach(p=>{
    if(p.from===S.call.peer)S.call.pc.addIceCandidate(p.cand).catch(()=>{});
    else keep.push(p);
  });
  pendingIce=keep;
}
function endCall(tellPeer){
  stopRing();
  if(S.call){
    if(tellPeer&&S.call.peer)send("call_end",{to:S.call.peer});
    try{S.call.pc.close()}catch(e){}
    if(S.call.stream){try{S.call.stream.getTracks().forEach(t=>t.stop())}catch(e){}}
  }
  S.call=null; pendingIce=[];
  if(!S.voice)stopBarTimer();
  const a=$("#call-audio"); if(a)a.srcObject=null;
  closeCallUI();
}
function showIncomingUI(from){
  const old=$("#incoming-banner"); if(old)old.remove();
  const b=el("div","incoming-banner"); b.id="incoming-banner";
  b.innerHTML=`<span class="ib-ic callpulse">📞</span>
    <div><div style="font-weight:700">${esc(from)} t'appelle</div><div class="fb-sub">Appel vocal entrant</div></div>
    <div class="ib-actions"><button class="btn green sm" id="ci-acc">Répondre</button>
    <button class="btn pink sm" id="ci-dec">Refuser</button></div>`;
  $("#call-ui").appendChild(b);
  $("#ci-acc").onclick=acceptCall; $("#ci-dec").onclick=declineCall;
}
function showCallUI(peer,outgoing){
  const inc=$("#incoming-banner"); if(inc)inc.remove();
  const old=$("#callbar"); if(old)old.remove();
  const b=el("div","floatbar"); b.id="callbar";
  b.innerHTML=`<div class="fb-top"><span class="fb-ic">🎧</span>
    <div><div class="fb-nm">${esc(peer)}</div><div class="fb-sub"><span id="call-status">…</span> · <span id="call-time">⏱ 00:00</span></div></div></div>
    <div class="fb-actions"><button class="btn ghost sm" id="call-mute">🔇 Muet</button>
    <button class="btn pink sm" id="call-hang">📴 Raccrocher</button></div>`;
  $("#call-ui").appendChild(b);
  $("#call-hang").onclick=()=>endCall(true); $("#call-mute").onclick=toggleMute;
  updateCallUI(); updateBarTime();
}
function updateCallUI(){
  const s=$("#call-status"); if(!s||!S.call)return;
  const map={appel:"sonne…",connexion:"connexion…",connected:"en ligne 🟢",reconnexion:"reconnexion…"};
  s.textContent=map[S.call.status]||"…";
}
function toggleMute(){
  if(!S.call||!S.call.stream)return;
  S.call.muted=!S.call.muted;
  S.call.stream.getAudioTracks().forEach(t=>t.enabled=!S.call.muted);
  const b=$("#call-mute"); if(b)b.textContent=S.call.muted?"🔊 Activer":"🔇 Muet";
}
function closeCallUI(){const b=$("#callbar");if(b)b.remove();const i=$("#incoming-banner");if(i)i.remove();}

setAuthMode("login");
connect();
